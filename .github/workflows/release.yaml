---
name: "Release: BookBoss"

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to build
        default: "latest"
        required: true
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build BookBoss
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Setup Tools
        shell: bash
        run: |
          sudo apt-get -qq update && \
          sudo apt-get -qq install --no-install-recommends -y curl unzip gcc g++ git

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Setup workflow Variables
        id: vars
        shell: bash
        run: |
          if test "$GITHUB_EVENT_NAME" == "workflow_dispatch"; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag_version=bookboss:${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(echo $GITHUB_REF | cut -d / -f 3)" >> "$GITHUB_OUTPUT"
            echo "tag_version=bookboss:$(echo $GITHUB_REF | cut -d / -f 3)" >> "$GITHUB_OUTPUT"
          fi

      # - name: Setup QEMU
      #   uses: docker/setup-qemu-action@68827325e0b33c7199eb31dd4e31fbe9023e06e3 # v3.0.0

      - name: Setup Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@2b51285047da1547ffb1b2203d8be4c0af6b1f20 # v3.2.0

      - name: Build container image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          build-args: |-
            VERSION=${{ steps.vars.outputs.version }}
          context: .
          platforms: linux/amd64 # load does not support muti-arch https://github.com/docker/buildx/issues/290
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ steps.vars.outputs.tag_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract release notes
        id: release_notes
        if: github.event_name == 'push'
        shell: bash
        run: |
          BARE_VERSION="$(echo '${{ steps.vars.outputs.version }}' | sed 's/^v//')"
          awk -v ver="$BARE_VERSION" '
            BEGIN { pat = "^## \\[" ver "\\]" }
            $0 ~ pat { found = 1; next }
            /^## \[/ { if (found) exit }
            found { print }
          ' CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          gh release create "${{ steps.vars.outputs.version }}" \
            --title "BookBoss ${{ steps.vars.outputs.version }}" \
            --notes-file release_notes.md
